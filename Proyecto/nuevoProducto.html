<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Tienda en Línea | Nuevo Producto</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body data-page="nuevo-producto">
		<header class="site-header">
			<div>
				<h1 class="brand-title">Tecno City Zone</h1>
			</div>
			<nav class="nav-links">
				<a href="index.html">Inicio</a>
				<a href="producto.html">Listado</a>
				<a href="nuevoProducto.html">Agregar nuevo</a>
				<a href="login.html">Login</a>
			</nav>
		</header>

		<main class="container">
			<section class="form-card">
				<form id="new-product-form" class="product-form">
					<div class="field">
						<label for="nombre">Nombre *</label>
						<input id="nombre" name="nombre" required />
					</div>
					<div class="field">
						<label for="marca">Marca</label>
						<input id="marca" name="marca" />
					</div>
					<div class="field">
						<label for="modelo">Modelo</label>
						<input id="modelo" name="modelo" />
					</div>
					<div class="field">
						<label for="categoria">Categoria *</label>
						<select id="categoria" name="categoria" required>
							<option value="">Selecciona una categoria</option>
							<option value="Sonido">Sonido</option>
							<option value="Almacenamiento">Almacenamiento</option>
							<option value="Computo">Computo</option>
							<option value="Redes">Redes</option>
							<option value="Gaming">Gaming</option>
							<option value="Televisores">Televisores</option>
							<option value="Wearables">Wearables</option>
							<option value="Accesorios">Accesorios</option>
							<option value="Otros">Otros</option>
						</select>
					</div>
					<div class="field">
						<label for="precio">Precio *</label>
						<input id="precio" name="precio" type="number" required />
					</div>
					<div class="field">
						<label for="descripcion">Descripción *</label>
						<textarea id="descripcion" name="descripcion" required></textarea>
					</div>
					<div class="field">
						<label for="tamano">Tamaño</label>
						<input id="tamano" name="tamano" />
					</div>
					<div class="field">
						<label for="peso">Peso</label>
						<input id="peso" name="peso" />
					</div>
					<div class="field">
						<label for="color">Color</label>
						<input id="color" name="color" />
					</div>
					<div class="field">
						<label for="conexion">Conexión</label>
						<input id="conexion" name="conexion" />
					</div>
					<div class="field">
						<label for="garantia">Garantía</label>
						<input id="garantia" name="garantia" placeholder="Ej: 12 meses" />
					</div>
					<div class="field">
						<label for="imagen">URL Imagen</label>
						<input id="imagen" name="imagen" placeholder="https://..." />
					</div>
					<div class="field">
						<label for="activo">Estado</label>
						<select id="activo" name="activo">
							<option value="true">Activo</option>
							<option value="false">Inactivo</option>
						</select>
					</div>
					<button class="btn btn-primary" type="submit">Guardar producto</button>
				</form>
			</section>
		</main>

		<script src="script.js"></script>
	</body>
</html>
