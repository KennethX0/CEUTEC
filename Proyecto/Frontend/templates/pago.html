<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Tienda en Línea | Pago</title>
		<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
	</head>
	<body data-page="pago">
		<header class="site-header">
			<div>
				<h1 class="brand-title">Tecno City Zone</h1>
			</div>
			<nav class="nav-links">
				<a href="index.html">Inicio</a>
				<a href="carrito.html">Carrito</a>
				<a href="login.html">Login</a>
			</nav>
		</header>

		<main class="container">
			<section class="table-wrap" style="margin-bottom: 16px;">
				<h2>Resumen de compra</h2>
				<table>
					<thead>
						<tr>
							<th>Producto</th>
							<th>Precio</th>
							<th>Cantidad</th>
							<th>Subtotal</th>
						</tr>
					</thead>
					<tbody id="checkout-items"></tbody>
				</table>
				<p id="checkout-total" class="hero" style="margin-top: 16px;"></p>
			</section>

			<section id="checkout-empty" class="empty-state" hidden>
				<p>No hay productos en el carrito para pagar.</p>
				<a href="carrito.html" class="btn btn-primary">Volver al carrito</a>
			</section>

			<section class="form-card" id="checkout-form-card">
				<h2>Datos para el pago</h2>
				<form id="checkout-form" class="product-form">
					<div class="field">
						<label for="checkout-nombre">Nombre completo</label>
						<input id="checkout-nombre" type="text" required />
					</div>
					<div class="field">
						<label for="checkout-direccion">Dirección de entrega</label>
						<input id="checkout-direccion" type="text" required />
					</div>
					<div class="field">
						<label for="checkout-telefono">Teléfono</label>
						<input id="checkout-telefono" type="text" required />
					</div>
					<div class="field">
						<label for="checkout-metodo">Método de pago</label>
						<select id="checkout-metodo" required>
							<option value="">Selecciona un método</option>
							<option value="paypal">PayPal</option>
							<option value="tarjeta">Tarjeta de crédito</option>
						</select>
					</div>

					<div id="paypal-fields" hidden>
						<div class="field">
							<label for="checkout-paypal-email">Correo de PayPal</label>
							<input id="checkout-paypal-email" type="email" placeholder="correo@paypal.com" />
						</div>
					</div>

					<div id="card-fields" hidden>
						<div class="field">
							<label for="checkout-card-number">Número de tarjeta</label>
							<input id="checkout-card-number" type="text" inputmode="numeric" maxlength="19" placeholder="1234123412341234" />
						</div>
						<div class="field">
							<label for="checkout-card-name">Nombre del titular</label>
							<input id="checkout-card-name" type="text" placeholder="Nombre como aparece en la tarjeta" />
						</div>
						<div class="field">
							<label for="checkout-card-expiry">Fecha de vencimiento (MM/YYYY)</label>
							<input id="checkout-card-expiry" type="text" maxlength="7" placeholder="MM/YYYY" />
						</div>
						<div class="field">
							<label for="checkout-card-cvv">CVV</label>
							<input id="checkout-card-cvv" type="password" inputmode="numeric" maxlength="4" placeholder="123" />
						</div>
					</div>
					<div class="field terms-check">
						<input id="checkout-terms" type="checkbox" />
						<label for="checkout-terms">Acepto los</label>
						<a href="legal.html#terminos" target="_blank" rel="noopener noreferrer">términos y condiciones</a>
					</div>
					<p id="checkout-error" class="form-error" hidden></p>
					<button class="btn btn-primary" type="submit">Confirmar compra</button>
				</form>
			</section>

			<section id="invoice-result" class="form-card" hidden></section>
		</main>

		<footer class="site-footer">
			<a href="legal.html#terminos">Términos y condiciones</a>
			<a href="legal.html#privacidad">Política de privacidad</a>
			<a href="legal.html#devoluciones">Política de devoluciones</a>
		</footer>

		<script src="{{ url_for('static', filename='script.js') }}"></script>
	</body>
</html>
