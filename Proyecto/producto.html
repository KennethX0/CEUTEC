<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Tienda en Línea | Administración</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body data-page="producto">
		<header class="site-header">
			<div>
				<h1 class="brand-title">Tecno City Zone</h1>
			</div>
			<nav class="nav-links">
				<a href="index.html">Inicio</a>
				<a href="producto.html">Listado</a>
				<a href="nuevoProducto.html">Agregar nuevo</a>
				<a href="login.html">Login</a>
			</nav>
		</header>

		<main class="container">
			<section class="admin-toolbar" aria-label="Controles de listado">
				<div class="admin-control">
					<label for="admin-estado-filtro">Mostrar</label>
					<select id="admin-estado-filtro">
						<option value="all">Todos</option>
						<option value="activos">Solo visibles</option>
						<option value="inactivos">Solo inactivos</option>
					</select>
				</div>
				<div class="admin-control">
					<label for="admin-categoria-filtro">Categoria</label>
					<select id="admin-categoria-filtro">
						<option value="all">Todas</option>
					</select>
				</div>
				<div class="admin-control">
					<label for="admin-orden-nombre">Orden por nombre</label>
					<select id="admin-orden-nombre">
						<option value="az">A-Z</option>
						<option value="za">Z-A</option>
					</select>
				</div>
				<p id="admin-products-summary" class="admin-summary"></p>
			</section>

			<section class="table-wrap">
				<table>
					<thead>
						<tr>
							<th>Nombre</th>
							<th>Precio</th>
							<th>Estatus</th>
							<th>Opciones</th>
						</tr>
					</thead>
					<tbody id="admin-products-body"></tbody>
				</table>
			</section>
		</main>

		<footer class="site-footer">
			<a href="legal.html#terminos">Términos y condiciones</a>
			<a href="legal.html#privacidad">Política de privacidad</a>
			<a href="legal.html#devoluciones">Política de devoluciones</a>
		</footer>

		<script src="script.js"></script>
	</body>
</html>
